<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.carousel-item img{
    height: 500px;
    object-fit: cover;
}

/* text style */
.carousel-caption{
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 10px;
}

</style>

</head>
<body>


<div id="demo" class="carousel slide" data-bs-ride="carousel">

  <!-- indicators -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
  </div>


  <!-- carousel -->
  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="https://picsum.photos/id/1018/1200/500" class="d-block w-100">

      <!-- TEXT -->
      <div class="carousel-caption">
        <h2>Welcome</h2>
        <p>This is first slide text</p>
        <button class="btn btn-warning">Read More</button>
      </div>

    </div>


    <div class="carousel-item">
      <img src="https://picsum.photos/id/1015/1200/500" class="d-block w-100">

      <div class="carousel-caption">
        <h2>Bootstrap Carousel</h2>
        <p>Text on image using caption</p>
      </div>

    </div>


    <div class="carousel-item">
      <img src="https://picsum.photos/id/1016/1200/500" class="d-block w-100">

      <div class="carousel-caption">
        <h2>Easy Design</h2>
        <p>Overlay text example</p>
      </div>

    </div>

  </div>


  <!-- buttons -->
  <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
